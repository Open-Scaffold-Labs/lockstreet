name: API Health Probe

# Runs every 10 minutes. Probes every api/*.js source file against the
# live production URL. If any source file maps to a 404 or other failure,
# the workflow fails red (you get an email from GitHub) and tries to
# auto-recover by triggering a Vercel redeploy via deploy hook.
#
# This catches the failure mode Matt hit on May 3: Vercel silently dropped
# two of our largest functions during deploy, build status said "Ready",
# but the routing table was missing endpoints. Without this workflow we
# only noticed days later when /lines started showing empty.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe API endpoints
        id: probe
        env:
          BASE_URL: ${{ vars.HEALTH_PROBE_URL || 'https://lockstreet.vercel.app' }}
        run: |
          set -u
          cd "$GITHUB_WORKSPACE"
          fail=0
          missing=()
          for f in api/*.js; do
            base=$(basename "$f" .js)
            case "$base" in _*) continue ;; esac
            url="$BASE_URL/api/$base"
            # We don't care WHICH non-404 status â€” 200, 400, 401, 403, 405 all
            # mean the function is deployed. Only 404 means missing entirely.
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            echo "[probe] /api/$base -> HTTP $status"
            if [ "$status" = "404" ] || [ "$status" = "000" ]; then
              missing+=("$base ($status)")
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::Missing endpoints: ${missing[*]}"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All api/*.js source files map to deployed functions."

      - name: Probe feature data quality
        id: feature
        env:
          BASE_URL: ${{ vars.HEALTH_PROBE_URL || 'https://lockstreet.vercel.app' }}
        run: |
          set -u
          fail=0
          fails=()
          # 1. Public betting splits â€” at least one league must return rows
          # with non-null bets % and money % values. Catches the "endpoint
          # returns 200 but data is null" regression we hit May 3 (cron was
          # firing into a 404 endpoint, but if it had been 200 with nulls
          # we'd have stayed broken just as long).
          for lg in mlb nba nhl nfl; do
            body=$(curl -sS --max-time 20 "$BASE_URL/api/team-intel?op=public-betting&league=$lg" || echo '{}')
            rows=$(echo "$body" | jq '.rows // [] | length' 2>/dev/null || echo 0)
            if [ "$rows" -gt 0 ]; then
              # Check at least 1 row has bets % data â€” defends against the
              # "scraped but every field is null" failure mode.
              betsPctRows=$(echo "$body" | jq '[.rows[]? | select(.spreadHomePctBets != null)] | length' 2>/dev/null || echo 0)
              # Check at least 1 row has Last 10 ATS data â€” defends against
              # the May-4 regression where the SAO rewrite forgot to fetch
              # per-game pages and ATS columns silently went to null.
              atsRows=$(echo "$body" | jq '[.rows[]? | select(.awayLast10AtsPct != null)] | length' 2>/dev/null || echo 0)
              echo "[feature] $lg: rows=$rows, betsPctRows=$betsPctRows, atsRows=$atsRows"
              if [ "$betsPctRows" = "0" ]; then
                fails+=("$lg-betsPct-all-null")
                fail=1
              fi
              if [ "$atsRows" = "0" ]; then
                fails+=("$lg-last10ATS-all-null")
                fail=1
              fi
              # Once we've found at least one league with full data, we're done
              # checking betting splits â€” others can be 0-row days legitimately
              # (off-season, no games scheduled, etc.).
              if [ "$betsPctRows" -gt "0" ] && [ "$atsRows" -gt "0" ]; then
                echo "[feature] $lg has full data â€” skipping further leagues."
                break
              fi
            else
              echo "[feature] $lg: 0 rows"
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::Feature data-quality failures: ${fails[*]}"
            echo "fails=${fails[*]}" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Feature data-quality OK."

      - name: Auto-recover by triggering Vercel redeploy
        if: failure() && env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          set -e
          echo "Triggering Vercel redeploy via deploy hook..."
          response=$(curl -sS -X POST "$VERCEL_DEPLOY_HOOK" --max-time 30)
          echo "Vercel response: $response"
          echo "::warning::Vercel redeploy triggered. Re-run this workflow in ~2 min to confirm fix."

      - name: Send push notification
        if: failure() && env.PUSH_BROADCAST_URL != ''
        env:
          PUSH_BROADCAST_URL: ${{ secrets.ADMIN_PUSH_BROADCAST_URL }}
          ADMIN_PASSWORD:     ${{ secrets.ADMIN_PASSWORD }}
        run: |
          set -e
          missing="${{ steps.probe.outputs.missing }}"
          curl -sS -X POST "$PUSH_BROADCAST_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -d "{\"title\":\"Lock Street health probe FAILED\",\"body\":\"Missing endpoints: $missing. Auto-redeploy triggered.\"}" \
            --max-time 15 || echo "Push broadcast failed (non-fatal)"
