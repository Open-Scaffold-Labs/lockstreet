<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lsbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#141114"/>
    </linearGradient>
    <filter id="lsglow" x="-75%" y="-75%" width="250%" height="250%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#lsbg)"/>
  <!-- Strong purple glow layer behind LS -->
  <text x="32" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" letter-spacing="-1" fill="#c084fc" filter="url(#lsglow)">LS</text>
  <!-- Main LS on top -->
  <text x="32" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" letter-spacing="-1">
    <tspan fill="#ffffff">L</tspan><tspan fill="#c084fc">S</tspan>
  </text>
</svg>