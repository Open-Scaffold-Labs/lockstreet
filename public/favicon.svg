<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lsbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#141114"/>
    </linearGradient>
    <filter id="lsglow-near" x="-75%" y="-75%" width="250%" height="250%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="lsglow-mid" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="lsglow-far" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#lsbg)"/>
  <!-- LS pushed to upper third so glow lives at the top and the bottom
       half stays solid black. -->
  <text x="32" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="-1" fill="#c084fc" filter="url(#lsglow-far)">LS</text>
  <text x="32" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="-1" fill="#c084fc" filter="url(#lsglow-mid)">LS</text>
  <text x="32" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="-1" fill="#c084fc" filter="url(#lsglow-near)">LS</text>
  <text x="32" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="-1">
    <tspan fill="#ffffff">L</tspan><tspan fill="#c084fc">S</tspan>
  </text>
</svg>