<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lsbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#141114"/>
    </linearGradient>
    <radialGradient id="topglow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#c084fc" stop-opacity="0.45"/>
      <stop offset="65%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#lsbg)"/>
  <!-- Bright purple haze at the top of the square, fading down through
       the top half. Independent of the letters — no halo around LS. -->
  <rect width="64" height="64" rx="14" fill="url(#topglow)"/>
  <!-- Crisp LS at the original centered position (y=42). -->
  <text x="32" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" letter-spacing="-1">
    <tspan fill="#ffffff">L</tspan><tspan fill="#c084fc">S</tspan>
  </text>
</svg>